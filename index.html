<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealVision AI Studio</title>

<style>
body{
background:#0b0615;
font-family:Arial,sans-serif;
color:white;
text-align:center;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
color:#b56cff;
}

textarea{
width:90%;
height:120px;
background:#1a1027;
color:white;
border:none;
padding:15px;
border-radius:12px;
font-size:16px;
}

button{
margin-top:20px;
padding:15px 30px;
background:#8a2be2;
color:white;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

img{
margin-top:30px;
width:95%;
max-width:700px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="container">
<h1>RealVision AI Studio</h1>
<p>Create Real AI Generated Images</p>

<textarea id="prompt" placeholder="Write prompt here..."></textarea>
<br>

<button onclick="generateImage()">Generate AI Image</button>

<div id="result"></div>
</div>

<script>
function generateImage() {
 let prompt = document.getElementById("prompt").value;

 if(prompt==""){
   alert("Enter prompt first");
   return;
 }

 let imageUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

 document.getElementById("result").innerHTML =
 "<h3>Generating...</h3><img src='" + imageUrl + "'>";
}
</script>

</body>
</html>
