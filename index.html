<!DOCTYPE html>
<html>
<head>
<title>RealVision AI Studio Pro</title>
<style>
body{
background:#0b0615;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}
.box{
max-width:900px;
margin:auto;
background:#171122;
padding:20px;
border-radius:20px;
}
h1{color:#b56cff;}
textarea{
width:90%;
height:120px;
background:#1a1027;
color:white;
border:none;
padding:15px;
border-radius:12px;
font-size:16px;
}
select,button{
margin:10px;
padding:12px;
border:none;
border-radius:10px;
}
button{
background:#8a2be2;
color:white;
cursor:pointer;
}
img{
margin-top:20px;
width:95%;
max-width:700px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="box">
<h1>RealVision AI Studio Pro</h1>

<textarea id="prompt" placeholder="Enter your prompt..."></textarea>

<br>

<select id="style">
<option>Realistic</option>
<option>Cinematic</option>
<option>Documentary</option>
<option>Anime</option>
</select>

<br>

<button onclick="enhancePrompt()">Enhance Prompt</button>
<button onclick="generateImage()">Generate HD Image</button>

<div id="showPrompt"></div>
<div id="result"></div>

</div>

<script>

let finalPrompt="";

function enhancePrompt(){

let prompt=document.getElementById("prompt").value;
let style=document.getElementById("style").value;

finalPrompt=prompt + " ultra detailed, 8k, highly realistic, " + style + " lighting, professional photography";

document.getElementById("showPrompt").innerHTML=
"<p>Enhanced Prompt:<br>"+finalPrompt+"</p>";
}

function generateImage(){

if(finalPrompt==""){
alert("Enhance prompt first");
return;
}

let url="https://image.pollinations.ai/prompt/"+encodeURIComponent(finalPrompt);

document.getElementById("result").innerHTML=
"<h3>Generating...</h3><img id='img' src='"+url+"'><br><br><a id='download' href='"+url+"' download><button>Download</button></a>";
}

</script>

</body>
</html>
