<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealVision AI Studio</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#05030a,#130720);
    color:white;
    text-align:center;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    padding:30px;
}

h1{
    color:#b56cff;
    font-size:32px;
}

.subtitle{
    opacity:0.8;
    margin-bottom:30px;
}

.box{
    background:#171122;
    padding:20px;
    border-radius:20px;
}

textarea{
    width:95%;
    height:130px;
    background:#0f0b18;
    color:white;
    border:none;
    padding:15px;
    border-radius:15px;
    font-size:15px;
}

select{
    margin-top:15px;
    padding:12px;
    border-radius:10px;
    border:none;
    width:250px;
}

button{
    margin-top:20px;
    padding:15px 35px;
    background:#8a2be2;
    color:white;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:17px;
}

button:hover{
    opacity:0.8;
}

.output{
    margin-top:30px;
    background:#0f0b18;
    padding:20px;
    border-radius:20px;
}

.card{
    margin:15px;
    padding:15px;
    background:#20182e;
    border-radius:15px;
}

.footer{
    margin-top:40px;
    opacity:0.5;
}
</style>
</head>

<body>

<div class="container">

<h1>RealVision AI Studio</h1>
<p class="subtitle">Create Ultra Realistic AI Documentary Content</p>

<div class="box">

<textarea id="prompt" placeholder="Example: Create a cinematic documentary scene about ancient Egypt at sunset..."></textarea>

<br>

<select id="mode">
<option>Facebook Reel 9:16</option>
<option>Instagram Reel 9:16</option>
<option>YouTube Documentary 16:9</option>
</select>

<br>

<button onclick="generateAI()">Generate AI Content</button>

</div>

<div class="output" id="output">

<div class="card">AI Image Generator : Waiting...</div>

<div class="card">AI Video Generator : Waiting...</div>

<div class="card">Voice Over Generator : Waiting...</div>

<div class="card">Background Music Engine : Waiting...</div>

<div class="card">Documentary Script Writer : Waiting...</div>

</div>

<p class="footer">Powered by RealVision AI Engine v1</p>

</div>

<script>

function generateAI(){

let prompt=document.getElementById("prompt").value;
let mode=document.getElementById("mode").value;

document.getElementById("output").innerHTML=`

<div class="card">Generating Realistic AI Image...</div>

<div class="card">Generating AI Video Sequence...</div>

<div class="card">Creating Voice Over...</div>

<div class="card">Matching Background Music...</div>

<div class="card">Writing Documentary Script...</div>

<div class="card">
<b>Prompt:</b> ${prompt}<br><br>
<b>Mode:</b> ${mode}
</div>

<div class="card">
AI Backend Connection Coming Next Phase...
</div>

`;

}

</script>

</body>
</html>
